name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-fellowmart
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy (Linux)
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: https://fellomart.builddock.website
      NEXT_PUBLIC_SITE_URL: https://fellomart.builddock.website
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      IMAGEKIT_PUBLIC_KEY: ${{ secrets.IMAGEKIT_PUBLIC_KEY }}
      IMAGEKIT_PRIVATE_KEY: ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
      IMAGEKIT_URL_ENDPOINT: ${{ secrets.IMAGEKIT_URL_ENDPOINT }}
      RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
      RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
      RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
      PLATFORM_ADMIN_EMAIL: ${{ secrets.PLATFORM_ADMIN_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate GitHub secrets
        run: |
          missing=""
          for key in \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            NEXT_PUBLIC_SUPABASE_URL \
            NEXT_PUBLIC_SUPABASE_ANON_KEY \
            SUPABASE_SERVICE_ROLE_KEY \
            IMAGEKIT_PUBLIC_KEY \
            IMAGEKIT_PRIVATE_KEY \
            IMAGEKIT_URL_ENDPOINT \
            RAZORPAY_KEY_ID \
            RAZORPAY_KEY_SECRET \
            PLATFORM_ADMIN_EMAIL
          do
            if [ -z "${!key}" ]; then
              missing="$missing $key"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub Actions secrets:$missing"
            echo "Add them at: Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "$RAZORPAY_WEBHOOK_SECRET" ]; then
            echo "::warning::RAZORPAY_WEBHOOK_SECRET is not set — webhooks will not verify until added"
          fi

      - name: Build for Cloudflare (Linux)
        run: npx opennextjs-cloudflare build

      - name: Sync Worker secrets
        run: |
          put_secret() {
            if [ -z "$2" ]; then
              echo "Skipping $1 (not set in GitHub Secrets)"
              return 0
            fi
            printf '%s' "$2" | npx wrangler secret put "$1" --config wrangler.jsonc
          }

          put_secret NEXT_PUBLIC_SUPABASE_URL "$NEXT_PUBLIC_SUPABASE_URL"
          put_secret NEXT_PUBLIC_SUPABASE_ANON_KEY "$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          put_secret SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY"
          put_secret IMAGEKIT_PUBLIC_KEY "$IMAGEKIT_PUBLIC_KEY"
          put_secret IMAGEKIT_PRIVATE_KEY "$IMAGEKIT_PRIVATE_KEY"
          put_secret IMAGEKIT_URL_ENDPOINT "$IMAGEKIT_URL_ENDPOINT"
          put_secret RAZORPAY_KEY_ID "$RAZORPAY_KEY_ID"
          put_secret RAZORPAY_KEY_SECRET "$RAZORPAY_KEY_SECRET"
          put_secret RAZORPAY_WEBHOOK_SECRET "$RAZORPAY_WEBHOOK_SECRET"
          put_secret PLATFORM_ADMIN_EMAIL "$PLATFORM_ADMIN_EMAIL"

      - name: Deploy to Cloudflare Workers
        run: npx opennextjs-cloudflare deploy
